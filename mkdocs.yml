site_name: The Quokka Cookbook
site_description: Quantum computing recipes you can actually run
site_author: John Azariah
site_url: https://johnazariah.github.io/quokka-cookbook

repo_name: johnazariah/quokka-cookbook
repo_url: https://github.com/johnazariah/quokka-cookbook

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Learning Path: learning-path.md
  - References: references.md
  - About: about.md
  # ── Recipes — uncomment one at a time as they're published ──
  # - Recipes:
  #   - Overview: recipes/index.md
  #   - Appetizers:
  #     - "01 — Bell State": recipes/01-bell-state/README.md
  #     - "02 — Teleportation": recipes/02-teleportation/README.md
  #     - "03 — Deutsch-Jozsa": recipes/03-deutsch-jozsa/README.md
  #   - Mains:
  #     - "04 — Bernstein-Vazirani": recipes/04-bernstein-vazirani/README.md
  #     - "05 — Simon's Problem": recipes/05-simons-problem/README.md
  #     - "06 — Grover's Search": recipes/06-grovers-search/README.md
  #     - "07 — QAOA for MaxCut": recipes/07-qaoa-maxcut/README.md
  #     - "08 — VQE for H₂": recipes/08-vqe-h2/README.md
  #     - "09 — Quantum Fourier Transform": recipes/09-quantum-fourier-transform/README.md
  #   - Desserts:
  #     - "10 — Quantum Phase Estimation": recipes/10-quantum-phase-estimation/README.md
  #     - "11 — Error Mitigation (ZNE)": recipes/11-error-mitigation-zne/README.md
  #     - "12 — Quantum Counting": recipes/12-quantum-counting/README.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johnazariah/quokka-cookbook

copyright: Copyright &copy; 2026 John Azariah
